    <line x1="60" y1="80" x2="90" y2="220"/>
    <line x1="180" y1="90" x2="150" y2="180"/>
    <line x1="240" y1="130" x2="210" y2="210"/>
    <line x1="50" y1="180" x2="120" y2="120"/>
    <line x1="60" y1="80" x2="180" y2="90"/>
    <line x1="40" y1="50" x2="60" y2="80"/>
