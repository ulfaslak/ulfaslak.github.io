let hoverId = null;

function screenToSim(sx, sy) {
  return [(sx - transform.x) / transform.k, (sy - transform.y) / transform.k];
}

function draw() {
  ctx.save();
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.clearRect(0, 0, W(), H());
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.k, transform.k);

  ctx.strokeStyle = COLORS.edge;
  ctx.lineWidth = 0.6 / Math.max(1, transform.k * 0.7);
  ctx.beginPath();
  for (const e of edges) {
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);
  }
  ctx.stroke();

  for (const cls of [0, 2, 1]) {
    ctx.fillStyle = CLASS_COLORS[cls];
    for (const n of nodes) {
      if (n.c !== cls) continue;
      ctx.beginPath();
      ctx.arc(n.x, n.y, CLASS_RADIUS[cls], 0, 2 * Math.PI);
      ctx.fill();
    }
  }

  if (hoverId !== null) {
    const n = nodes[hoverId];
    if (n) {
      ctx.strokeStyle = COLORS.highlight;
      ctx.lineWidth = 2 / transform.k;
      ctx.beginPath();
      ctx.arc(n.x, n.y, CLASS_RADIUS[n.c] + 4 / transform.k, 0, 2 * Math.PI);
      ctx.stroke();
    }
  }
  ctx.restore();
}

canvas.addEventListener("mousemove", (e) => {
  const r = canvas.getBoundingClientRect();
  const [sx, sy] = screenToSim(e.clientX - r.left, e.clientY - r.top);
  const found = simulation.find(sx, sy, 12 / transform.k);
  const id = found ? found.id : null;
  if (id !== hoverId) {
    hoverId = id;
    if (simulation.alpha() < 0.02) draw();
  }
});
canvas.addEventListener("mouseleave", () => { hoverId = null; draw(); });

const zoom = d3.zoom()
  .scaleExtent([0.1, 12])
  .filter(() => d3.event.type !== "mousedown")
  .on("zoom", () => { transform = d3.event.transform; draw(); });
d3.select(canvas).call(zoom);

d3.select(canvas)
  .call(d3.drag()
    .container(canvas)
    .subject(() => {
      const [sx, sy] = screenToSim(d3.event.x, d3.event.y);
      return simulation.find(sx, sy, 14 / transform.k);
    })
    .on("start", () => {
      if (!d3.event.subject) return;
      if (!d3.event.active) simulation.alphaTarget(0.3).restart();
      d3.event.subject.fx = d3.event.subject.x;
      d3.event.subject.fy = d3.event.subject.y;
    })
    .on("drag", () => {
      if (!d3.event.subject) return;
      const [sx, sy] = screenToSim(d3.event.x, d3.event.y);
      d3.event.subject.fx = sx;
      d3.event.subject.fy = sy;
    })
    .on("end", () => {
      if (!d3.event.subject) return;
      if (!d3.event.active) simulation.alphaTarget(0);
      d3.event.subject.fx = null;
      d3.event.subject.fy = null;
    }));
</script>
</body>
</html>
